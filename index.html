<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>六合彩预测看板 · v6.1</title>
<style>
:root {
  --bg: #0a0a14; --surface: #141428; --surface2: #1a1a32; --border: #2a2a4a;
  --gold: #f0c060; --gold-dim: #8a6a2a; --red: #e05555; --green: #4ecb71;
  --blue: #5b9cf5; --text: #d0d0e0; --text-dim: #8888a8;
  --font: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  --font-mono: 'Cascadia Code','Fira Code','Consolas',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 10%,rgba(240,192,96,0.04) 0%,transparent 60%),
  radial-gradient(ellipse at 80% 90%,rgba(91,156,245,0.03) 0%,transparent 60%)}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;
  display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-left{display:flex;align-items:center;gap:12px}
.header-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),#e8a020);
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#1a1a2e}
.header h1{font-size:20px;font-weight:700}.header h1 span{color:var(--gold)}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.badge-ver{background:rgba(240,192,96,0.15);color:var(--gold)}
.badge-live{background:rgba(78,203,113,0.15);color:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.header-right{display:flex;gap:16px;font-size:12px;color:var(--text-dim)}
.header-right strong{color:var(--text)}
.main{max-width:1400px;margin:0 auto;padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.main{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.card:hover{border-color:var(--gold-dim)}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:1px}
.card-title .icon{font-size:18px}
.card-full{grid-column:1/-1}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;color:var(--text-dim);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;padding:8px 10px;border-bottom:2px solid var(--border)}
td{padding:7px 10px;border-bottom:1px solid rgba(42,42,74,0.5);white-space:nowrap}
tr:hover td{background:rgba(255,255,255,0.02)}
.num{font-family:var(--font-mono);font-weight:600;text-align:center}
.zodiac-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.hit-true{color:var(--green);font-weight:700}.hit-false{color:var(--red)}
.z-鼠{background:rgba(139,139,139,0.2);color:#b0b0b0}.z-牛{background:rgba(139,104,58,0.2);color:#c49656}
.z-虎{background:rgba(226,137,53,0.2);color:#e28935}.z-兔{background:rgba(231,148,168,0.2);color:#e794a8}
.z-龙{background:rgba(217,183,64,0.2);color:#d9b740}.z-蛇{background:rgba(109,165,95,0.2);color:#80c070}
.z-马{background:rgba(201,92,92,0.2);color:#d97070}.z-羊{background:rgba(218,210,178,0.2);color:#dad2b2}
.z-猴{background:rgba(161,117,66,0.2);color:#c49a60}.z-鸡{background:rgba(222,173,97,0.2);color:#dead61}
.z-狗{background:rgba(216,174,93,0.2);color:#d8ae5d}.z-猪{background:rgba(219,161,169,0.2);color:#dba1a9}
.prediction-rank{display:flex;flex-direction:column;gap:6px}
.pred-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--surface2);border:1px solid transparent;transition:all 0.2s}
.pred-item:hover{border-color:var(--gold-dim);transform:translateX(4px)}
.pred-item.r1{border-color:rgba(240,192,96,0.3);background:rgba(240,192,96,0.06)}
.pred-rank-num{font-size:18px;font-weight:900;width:28px;text-align:center;color:var(--text-dim)}
.pred-rank-num.top{color:var(--gold)}
.pred-zodiac{font-size:24px}.pred-name{font-size:14px;font-weight:700;min-width:24px}
.pred-score{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);width:44px;text-align:right}
.pred-miss{font-size:10px;min-width:52px;text-align:right}
.pred-miss.fire{color:#ff6b35;font-weight:700}
.pred-numbers{font-family:var(--font-mono);font-size:11px;color:var(--blue);flex:1}
.stat-row{display:flex;gap:10px;flex-wrap:wrap}
.stat-box{flex:1;min-width:90px;background:var(--surface2);border-radius:8px;padding:12px;text-align:center}
.stat-value{font-size:24px;font-weight:900;font-family:var(--font-mono)}.stat-value.gold{color:var(--gold)}.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}
.stat-label{font-size:10px;color:var(--text-dim);margin-top:2px;text-transform:uppercase}
.bar-row{display:flex;align-items:center;gap:6px;margin:2px 0;font-size:11px}
.bar-zodiac{width:32px;text-align:right;font-weight:600}
.bar-track{flex:1;height:16px;background:var(--surface2);border-radius:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:8px;transition:width 0.6s}
.bar-fill.high{background:linear-gradient(90deg,#ff6b35,#e05555)}.bar-fill.mid{background:linear-gradient(90deg,#f0c060,#e8a020)}.bar-fill.low{background:linear-gradient(90deg,#5b9cf5,#4ecb71)}
.bar-val{font-family:var(--font-mono);font-size:10px;width:30px;color:var(--text-dim)}
.zodiac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.zodiac-cell{background:var(--surface2);border-radius:8px;padding:8px;text-align:center;transition:all 0.2s}
.zodiac-cell:hover{background:rgba(240,192,96,0.08);transform:translateY(-2px)}
.zodiac-cell .z-emoji{font-size:22px}.zodiac-cell .z-name{font-size:11px;font-weight:600;margin:2px 0}
.zodiac-cell .z-nums{font-family:var(--font-mono);font-size:10px;color:var(--text-dim)}
.zodiac-cell .z-count{font-size:9px;color:var(--gold);margin-top:2px}
.footer{text-align:center;padding:16px;color:var(--text-dim);font-size:10px;border-top:1px solid var(--border);margin-top:32px}
.refresh-info{font-size:10px;color:var(--text-dim);margin-left:8px}
/* Password Gate */
.pw-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);
  display:flex;align-items:center;justify-content:center;z-index:9999;
  background-image:radial-gradient(ellipse at 50% 30%,rgba(240,192,96,0.06) 0%,transparent 60%)}
.pw-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:40px 36px;text-align:center;max-width:380px;width:90%}
.pw-box .pw-icon{font-size:48px;margin-bottom:16px}
.pw-box h2{font-size:20px;margin-bottom:8px;color:var(--text)}
.pw-box p{font-size:12px;color:var(--text-dim);margin-bottom:24px}
.pw-box input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:16px;text-align:center;
  font-family:var(--font-mono);outline:none;transition:border-color 0.2s;
  letter-spacing:3px}
.pw-box input:focus{border-color:var(--gold)}
.pw-box input.wrong{border-color:var(--red);animation:shake 0.4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.pw-error{color:var(--red);font-size:11px;margin-top:8px;display:none}

</style>
</head>
<body>
<div class="pw-overlay" id="pw-gate">
  <div class="pw-box">
    <div class="pw-icon">&#x1F510;</div>
    <h2>&#x516D;&#x5408;&#x5F69;&#x9884;&#x6D4B;&#x770B;&#x677F;</h2>
    <p>&#x8BF7;&#x8F93;&#x5165;&#x5BC6;&#x7801;&#x8BBF;&#x95EE;</p>
    <input type="password" id="pw-input" placeholder="&#x8BF7;&#x8F93;&#x5165;&#x5BC6;&#x7801;" autofocus>
    <p class="pw-error" id="pw-error">&#x5BC6;&#x7801;&#x9519;&#x8BEF;&#xFF0C;&#x8BF7;&#x91CD;&#x8BD5;</p>
  </div>
</div>

<div class="header">
  <div class="header-left">
    <div class="header-logo">🎯</div>
    <h1>六合彩<span>预测看板</span></h1>
    <span class="badge badge-ver">v6.1</span>
    <span class="badge badge-live">● 实盘验证中</span>
    <span class="refresh-info" id="update-time"></span>
  </div>
  <div class="header-right">
    <div>数据截至 <strong id="hd-end-date">---</strong></div>
    <div>累计 <strong id="hd-total">--</strong>期</div>
    <div>下期 <strong id="hd-next">---</strong></div>
  </div>
</div>
<div class="main">
  <div class="card card-full">
    <div class="card-title"><span class="icon">📊</span> 模型概览</div>
    <div class="stat-row" id="stats-bar"></div>
  </div>
  <div class="card">
    <div class="card-title"><span class="icon">📋</span> 最近10期开奖</div>
    <div class="table-wrap"><table><thead><tr><th>序号</th><th>期号</th><th>日期</th><th>号码</th><th>生肖</th><th>预测</th></tr></thead><tbody id="recent-draws"></tbody></table></div>
  </div>
  <div class="card">
    <div class="card-title"><span class="icon">🔢</span> 生肖号码对照表</div>
    <div class="zodiac-grid" id="zodiac-grid"></div>
  </div>
  <div class="card">
    <div class="card-title"><span class="icon">🎯</span> 本期预测 <span id="pred-title"></span></div>
    <div class="prediction-rank" id="prediction-list"></div>
    <div style="margin-top:14px;padding:10px;background:var(--surface2);border-radius:8px;font-family:var(--font-mono);font-size:11px;color:var(--blue)">
      📌 推荐号码 (<span id="num-count">0</span>个): <span id="pred-numbers"></span>
    </div>
  </div>
  <div class="card">
    <div class="card-title"><span class="icon">🔥</span> 当下遗漏分析</div>
    <div id="miss-bars"></div>
  </div>
</div>
<div class="footer">数据来源: limaoqiu.com &nbsp;|&nbsp; 模型: v6.1 M6集成 (热号+遗漏+马尔可夫) &nbsp;|&nbsp; 页面自动从GitHub加载最新数据</div>

<script>
const ZN={鼠:[7,19,31,43],牛:[6,18,30,42],虎:[5,17,29,41],兔:[4,16,28,40],龙:[3,15,27,39],蛇:[2,14,26,38],马:[1,13,25,37,49],羊:[12,24,36,48],猴:[11,23,35,47],鸡:[10,22,34,46],狗:[9,21,33,45],猪:[8,20,32,44]};
const ZE={鼠:"🐭",牛:"🐮",虎:"🐯",兔:"🐰",龙:"🐲",蛇:"🐍",马:"🐴",羊:"🐑",猴:"🐵",鸡:"🐔",狗:"🐶",猪:"🐷"};
const ALL=Object.keys(ZN);

async function load(){
  try{
    const r=await fetch("data.json?t="+Date.now());
    const d=await r.json();
    render(d);
  }catch(e){
    document.body.innerHTML='<div style="text-align:center;padding:100px;color:var(--gold)"><h2>⏳ 加载数据中...</h2><p>首次部署后约1分钟生效</p></div>';
  }
}

function render(d){
  // Header
  document.getElementById("update-time").textContent = "更新于 "+d.updateTime.split("T")[0];
  const lastD=d.draws[d.draws.length-1];
  document.getElementById("hd-end-date").textContent=lastD.date;
  document.getElementById("hd-total").textContent=d.totalDraws+"期";
  document.getElementById("hd-next").textContent="第"+(d.totalDraws+1)+"期 "+d.prediction.date;

  // Stats
  const st=document.getElementById("stats-bar");
  st.innerHTML=
    '<div class="stat-box"><div class="stat-value gold">'+(d.stats.rollHitRate*100).toFixed(1)+'%</div><div class="stat-label">滚动回测命中率</div></div>'+
    '<div class="stat-box"><div class="stat-value green">'+(d.stats.mcHitRate*100).toFixed(1)+'%</div><div class="stat-label">蒙特卡洛日均</div></div>'+
    '<div class="stat-box"><div class="stat-value">'+(d.stats.mcP95*100).toFixed(1)+'%</div><div class="stat-label">蒙特卡洛P95</div></div>'+
    '<div class="stat-box"><div class="stat-value">'+d.prediction.top7.length+'</div><div class="stat-label">TOPK推荐生肖数</div></div>'+
    '<div class="stat-box"><div class="stat-value red">'+d.stats.liveHits+'/'+d.stats.liveTotal+'</div><div class="stat-label">实盘命中</div></div>';

  // Recent draws
  const recent=d.draws.slice(-10).reverse();
  const tb=document.getElementById("recent-draws");
  recent.forEach(r=>{
    const hit=r.predHit===null?"—":r.predHit?"<span class='hit-true'>✅ 命中</span>":"<span class='hit-false'>❌ 未中</span>";
    tb.innerHTML+='<tr><td style="color:var(--text-dim)">#'+r.idx+'</td><td style="font-family:var(--font-mono);font-weight:600">'+r.period+'</td><td style="color:var(--text-dim)">'+r.date+'</td><td class="num" style="color:var(--gold)">'+String(r.num).padStart(2,"0")+'</td><td><span class="zodiac-tag z-'+r.zodiac+'">'+ZE[r.zodiac]+' '+r.zodiac+'</span></td><td>'+hit+'</td></tr>';
  });

  // Zodiac grid
  const grid=document.getElementById("zodiac-grid");
  Object.entries(ZN).forEach(([z,nums])=>{
    grid.innerHTML+='<div class="zodiac-cell"><div class="z-emoji">'+ZE[z]+'</div><div class="z-name">'+z+'</div><div class="z-nums">'+nums.join(" ")+'</div><div class="z-count">出现'+(d.zodiacCounts[z]||0)+'次</div></div>';
  });

  // Miss bars
  const lastSeen={};
  d.draws.forEach((dr,i)=>{lastSeen[dr.zodiac]=i;});
  const misses=ALL.map(z=>({z,m:z in lastSeen?d.draws.length-1-lastSeen[z]:d.draws.length})).sort((a,b)=>b.m-a.m);
  const md=document.getElementById("miss-bars");
  misses.forEach(({z,m})=>{
    const pct=Math.min(100,m/35*100);
    const cls=m>=15?"high":m>=7?"mid":"low";
    md.innerHTML+='<div class="bar-row"><span class="bar-zodiac">'+ZE[z]+' '+z+'</span><div class="bar-track"><div class="bar-fill '+cls+'" style="width:'+pct+'%"></div></div><span class="bar-val">'+m+"期"+(m>=15?" 🔥":"")+'</span></div>';
  });

  // Prediction
  document.getElementById("pred-title").textContent="第"+d.prediction.period+"期 · "+d.prediction.date;
  const pd=document.getElementById("prediction-list");
  d.prediction.top7.forEach((z,i)=>{
    const sc=d.prediction.scores[z]||0;
    const m=misses.find(x=>x.z===z)?.m||0;
    pd.innerHTML+='<div class="pred-item'+(i<3?" r1":"")+'"><span class="pred-rank-num'+(i<3?" top":"")+'">#'+(i+1)+'</span><span class="pred-zodiac">'+ZE[z]+'</span><span class="pred-name">'+z+'</span><span class="pred-score">'+sc.toFixed(1)+'分</span><span class="pred-miss'+(m>=15?" fire":"")+'">遗漏'+m+'期</span><span class="pred-numbers">'+ZN[z].join(" ")+'</span></div>';
  });
  const an=[...new Set(d.prediction.top7.flatMap(z=>ZN[z]))].sort((a,b)=>a-b);
  document.getElementById("num-count").textContent=an.length;
  document.getElementById("pred-numbers").textContent=an.join("  ");
}

load();
// Password gate
(async function(){
  const HASH='b50b302464ba5289ac41381a8812087735e394af8e49ab2266353f49c7b418b7';
  if(sessionStorage.getItem('pw_ok')==='1') return;
  const gate=document.getElementById('pw-gate');
  const inp=document.getElementById('pw-input');
  const err=document.getElementById('pw-error');
  gate.style.display='flex';
  async function check(){
    const data=new TextEncoder().encode(inp.value);
    const hash=Array.from(new Uint8Array(await crypto.subtle.digest('SHA-256',data)))
      .map(b=>b.toString(16).padStart(2,'0')).join('');
    if(hash===HASH){
      sessionStorage.setItem('pw_ok','1');
      gate.style.display='none';
    }else{
      inp.classList.add('wrong');
      err.style.display='block';
      inp.value='';
      setTimeout(function(){inp.classList.remove('wrong');},400);
    }
  }
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')check();});
  inp.addEventListener('input',function(){err.style.display='none';});
  inp.addEventListener('blur',function(){if(inp.value)check();});
})();

</script>
</body>
</html>
