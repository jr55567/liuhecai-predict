* { margin:0; padding:0; box-sizing:border-box; }
body {

.header {

  position: sticky; top: 0; z-index: 100;

.header-left { display:flex; align-items:center; gap:16px; }
.header-logo {

.header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }

.badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; letter-spacing: 0.5px; }
.badge-ver { background: rgba(240,192,96,0.15); color: var(--gold); }
.badge-live { background: rgba(78,203,113,0.15); color: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.header-right { display:flex; gap:20px; font-size:13px; color:var(--text-dim); }
.header-right strong { color: var(--text); }
.main { max-width:1400px; margin:0 auto; padding:24px 32px; display:grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; gap:20px; }
@media(max-width:900px){ .main { grid-template-columns:1fr; } }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 24px;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--gold-dim); }
.card-title {
  font-size: 15px; font-weight: 700; margin-bottom: 18px;
  display:flex; align-items:center; gap:10px;

.card-title .icon { font-size:20px; }
.card-full { grid-column: 1 / -1; }
.table-wrap { overflow-x: auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th {

td { padding:9px 12px; border-bottom:1px solid rgba(42,42,74,0.5); white-space:nowrap; }

.num { font-family:var(--font-mono); font-weight:600; text-align:center; }
.zodiac-tag { display:inline-block; padding:2px 10px; border-radius:12px; font-size:12px; font-weight:600; letter-spacing:0.5px; }
.hit-true { color:var(--green); font-weight:700; }

.pred-zodiac { font-size:28px; }
.pred-name { font-size:15px; font-weight:700; min-width:28px; }
.pred-score { font-family:var(--font-mono); font-size:12px; color:var(--text-dim); min-width:50px; text-align:right; }
.pred-miss { font-size:11px; color:var(--red); min-width:60px; text-align:right; }

.bar-fill.mid { background:linear-gradient(90deg, #f0c060, #e8a020); }
